name: Update SBS Database

on:
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  update-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for `gh release` (Releases live under contents)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # R2 is the source of truth — pull the current DB down so the scraper
      # runs incrementally against the live state. Without this, each run
      # starts from the frozen committed snapshot and the subsequent upload
      # silently drops everything captured by previous runs.
      - name: Download current DB from R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 r2 object get \
            russia-ukraine-war/sbs.db \
            --file data/sbs.db \
            --remote

      - name: Run data fetcher
        env:
          DB_PATH: data/sbs.db
          SUMMARY_PATH: /tmp/update-summary.txt
        run: python scripts/fetch_and_update.py

      # Publish the same DB as a rolling `latest` release asset. Overwriting
      # the same asset URL each run keeps total Release storage at ~1 MB, no
      # history accrual. Released bytes are CDN-served with range support.
      # Unconditional: `--clobber` is idempotent and Release API calls are
      # well within free-tier limits.
      - name: Upload DB to rolling `latest` release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest \
              --title "Latest data snapshot" \
              --notes "Rolling release. Always overwritten by the most recent update-db run." \
              --prerelease
          fi
          SUMMARY=$(cat /tmp/update-summary.txt 2>/dev/null || echo "update")
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          NOTES=$(printf 'Last updated: %s\n\n%s' "$TIMESTAMP" "$SUMMARY")
          gh release upload latest data/sbs.db --clobber
          gh release edit latest --notes "$NOTES"

      # Upload to Cloudflare R2 (browser-fetchable with CORS, unlike the
      # Release CDN). One-time setup of the bucket + CORS lives in
      # cloudflare/r2-cors.json. Requires repo secrets CLOUDFLARE_API_TOKEN
      # (R2 Edit, scoped to the russia-ukraine-war bucket) and
      # CLOUDFLARE_ACCOUNT_ID. Unconditional: PUT is idempotent and well
      # within R2 free-tier limits.
      - name: Upload DB to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 r2 object put \
            russia-ukraine-war/sbs.db \
            --file data/sbs.db \
            --content-type application/vnd.sqlite3 \
            --remote
