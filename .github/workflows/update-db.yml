name: Update Database

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  update-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run data fetcher
        env:
          DB_PATH: data/sbs.db
          SUMMARY_PATH: /tmp/update-summary.txt
        run: python scripts/fetch_and_update.py

      - name: Commit updated DB (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sbs.db
          if ! git diff --staged --quiet; then
            SUMMARY=$(cat /tmp/update-summary.txt 2>/dev/null || echo "update")
            git commit -m "chore: update sbs.db [skip ci]" -m "$SUMMARY"
            git push
          fi
