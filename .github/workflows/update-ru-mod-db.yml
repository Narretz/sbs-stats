name: Update RU MoD Air-Defense Database

on:
  workflow_dispatch: # allow manual trigger from GitHub UI
  schedule:
    # The MoD posts air-defense intercept reports a few times a day (overnight
    # ~05–06 UTC, then daytime windows). Run every 6h to keep recent days fresh;
    # the incremental web pull stops as soon as it reaches already-stored posts.
    - cron: "0 */6 * * *"

# Single source of truth for the bucket + DB filename.
env:
  R2_BUCKET: russia-ukraine-war
  RU_MOD_DB_NAME: ru-mod-ad.db

jobs:
  update-ru-mod-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Pull the current DB so the build APPENDS into it (INSERT OR IGNORE by
      # Telegram post id) rather than starting empty. `continue-on-error` so the
      # very first run (object not yet in R2) still works — ingest then creates
      # the DB and walks back ~max-pages of recent history.
      - name: Download current RU MoD DB from R2
        id: download
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p scripts/ru_mod/output
          npx --yes wrangler@4 r2 object get \
            "$R2_BUCKET/$RU_MOD_DB_NAME" \
            --file "scripts/ru_mod/output/$RU_MOD_DB_NAME" \
            --remote

      # ingest.py parses @mod_russia via the t.me/s web preview (no Telegram API
      # account) and appends new air-defense reports + raw Сводка posts. Append-
      # only: a failed/empty fetch inserts nothing rather than corrupting the DB.
      # stdlib only, so no pip install needed. --max-pages gives catch-up margin
      # if a scheduled run was missed; it stops early once it hits known posts.
      - name: Build RU MoD DB
        run: |
          mkdir -p scripts/ru_mod/output
          python3 scripts/ru_mod/ingest.py \
            --source web --max-pages 40 \
            --out "scripts/ru_mod/output/$RU_MOD_DB_NAME"

      - name: Upload RU MoD DB to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 r2 object put \
            "$R2_BUCKET/$RU_MOD_DB_NAME" \
            --file "scripts/ru_mod/output/$RU_MOD_DB_NAME" \
            --content-type application/vnd.sqlite3 \
            --remote
